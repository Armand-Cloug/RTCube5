services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: rtcube5
    restart: unless-stopped
    ports:
      - "25565:25565"

    environment:
      # ── Légal ─────────────────────────────────────────────────
      EULA: "TRUE"

      # ── Type : CurseForge modpack auto-téléchargé ─────────────
      TYPE: "AUTO_CURSEFORGE"

      # Clé API CurseForge (obligatoire, voir README pour l'obtenir)
      CF_API_KEY: "${CF_API_KEY}"

      # Slug du modpack ATM10 sur CurseForge
      CF_SLUG: "all-the-mods-10"

      # Pour figer une version précise du modpack (recommandé en prod)
      # Laisse vide pour toujours prendre la dernière version stable
      # CF_FILE_ID: "XXXXXXX"

      # ── Identité du serveur ───────────────────────────────────
      MOTD: "§6✦ RTCube5 §f| §7«§6✦ §aServer Survival Hard de la Team §6✦§7» §eUne bande de puant qui clique surement plus fort que toi §d(Sauf Volio)"
      ICON: /data/server-icon.png

      # ── Whitelist ─────────────────────────────────────────────
      WHITELIST_ENABLED: "true"
      ENFORCE_WHITELIST: "true"
      WHITELIST: "Clougounette"

      # ── Opérateurs ────────────────────────────────────────────
      OPS: "Clougounette"

      # ── Gameplay ──────────────────────────────────────────────
      MODE: "survival"
      DIFFICULTY: "hard"
      MAX_PLAYERS: "20"
      PVP: "true"
      HARDCORE: "false"

      # ── Performance ───────────────────────────────────────────
      # ATM10 est lourd : minimum 8G recommandé sur 12G de RAM
      MAX_MEMORY: "10G"
      INIT_MEMORY: "4G"
      JVM_OPTS: >-
        -XX:+UseG1GC
        -XX:+ParallelRefProcEnabled
        -XX:MaxGCPauseMillis=200
        -XX:+UnlockExperimentalVMOptions
        -XX:+DisableExplicitGC
        -XX:+AlwaysPreTouch
        -XX:G1NewSizePercent=30
        -XX:G1MaxNewSizePercent=40
        -XX:G1HeapRegionSize=8M
        -XX:G1ReservePercent=20
        -XX:G1HeapWastePercent=5
        -XX:G1MixedGCCountTarget=4
        -XX:InitiatingHeapOccupancyPercent=15
        -XX:G1MixedGCLiveThresholdPercent=90
        -XX:G1RSetUpdatingPauseTimePercent=5
        -XX:SurvivorRatio=32
        -XX:+PerfDisableSharedMem
        -XX:MaxTenuringThreshold=1
        -Dfml.readTimeout=90
        -Dfml.loginTimeout=90
      VIEW_DISTANCE: "8"
      SIMULATION_DISTANCE: "6"

      # ── Sécurité ──────────────────────────────────────────────
      ONLINE_MODE: "true"
      ALLOW_FLIGHT: "true"    # Nécessaire avec des mods de vol (ATM10)
      MAX_TICK_TIME: "-1"     # Désactivé : les mods lourds font dépasser 60s

      # ── RCON ──────────────────────────────────────────────────
      ENABLE_RCON: "true"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      RCON_PORT: "25575"

    volumes:
      - ./data:/data
      - ./server-icon.png:/data/server-icon.png:ro
      # Mods supplémentaires à ajouter par-dessus ATM10
      - ./extra-mods:/data/mods
      # Configs personnalisées des mods
      - ./config:/data/config/custom
      - ./backups:/backups

    networks:
      - minecraft-net
    tty: true
    stdin_open: true

    # ATM10 met longtemps à démarrer (3-10 min)
    healthcheck:
      test: ["CMD", "mc-health"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 600s

  # ── Sauvegarde toutes les 30 minutes ──────────────────────────
  backup:
    image: alpine:latest
    container_name: rtcube5-backup
    restart: unless-stopped
    depends_on:
      minecraft:
        condition: service_healthy
    environment:
      RCON_PASSWORD: "${RCON_PASSWORD}"
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "/backup.sh"]
    networks:
      - minecraft-net

networks:
  minecraft-net:
    driver: bridge
