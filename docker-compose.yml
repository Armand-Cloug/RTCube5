services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: rtcube5
    restart: unless-stopped
    ports:
      - "25565:25565"

    environment:
      # ── Légal ────────────────────────────────────────────────
      EULA: "TRUE"

      # ── Type & Version ────────────────────────────────────────
      TYPE: "PAPER"
      VERSION: "1.21.11"

      # ── Identité du serveur ───────────────────────────────────
      # Ligne 1 : Titre coloré
      # Ligne 2 : Sous-titre (séparées par \n)
      # Codes couleur : §6=or §a=vert §7=gris §e=jaune §b=cyan §c=rouge §f=blanc
      MOTD: "§6✦ RTCube5 §f| §7«§6✦ §aServer Survival Hard de la Team §6✦§7» §eUne bande de puant qui clique surement plus fort que toi &d(Sauf Volio)"

      # Icône 64x64 montée depuis l'hôte
      ICON: /data/server-icon.png

      # ── Whitelist ─────────────────────────────────────────────
      WHITELIST_ENABLED: "true"
      ENFORCE_WHITELIST: "true"
      WHITELIST: "Clougounette"   # <-- Mets tes pseudos ici : "Joueur1,Joueur2"

      # ── Opérateurs ────────────────────────────────────────────
      OPS: "Clougounette"         # <-- Mets tes ops ici : "Joueur1"

      # ── Gameplay Survie ───────────────────────────────────────
      MODE: "survival"
      DIFFICULTY: "normal"
      ALLOW_NETHER: "true"
      SPAWN_ANIMALS: "true"
      SPAWN_MONSTERS: "true"
      SPAWN_NPCS: "true"
      GENERATE_STRUCTURES: "true"
      MAX_PLAYERS: "20"
      PVP: "true"
      HARDCORE: "false"

      # ── Performance ───────────────────────────────────────────
      MAX_MEMORY: "4G"
      INIT_MEMORY: "2G"
      USE_AIKAR_FLAGS: "true"
      VIEW_DISTANCE: "10"
      SIMULATION_DISTANCE: "8"

      # ── Sécurité / Réseau ─────────────────────────────────────
      ONLINE_MODE: "true"
      ALLOW_FLIGHT: "false"
      MAX_TICK_TIME: "60000"

      # ── RCON ──────────────────────────────────────────────────
      ENABLE_RCON: "true"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      RCON_PORT: "25575"

    volumes:
      - ./data:/data
      # L'icône est copiée dans /data au démarrage
      - ./server-icon.png:/data/server-icon.png:ro
      - ./backups:/backups

    networks:
      - minecraft-net
    tty: true
    stdin_open: true

  # ── Sauvegarde toutes les 30 minutes ──────────────────────────
  backup:
    image: alpine:latest
    container_name: rtcube5-backup
    restart: unless-stopped
    depends_on:
      - minecraft
    environment:
      RCON_PASSWORD: "${RCON_PASSWORD}"
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "/backup.sh"]
    networks:
      - minecraft-net

networks:
  minecraft-net:
    driver: bridge